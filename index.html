<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
            <div>
            <p class = "title">
                Sorteador de números
            </p>
                
            </div>
    </header>

    <main>
        <section id = "sec-principal">
            <div id = "principal-container">
                <div class = "div-pergunta-usuario">
                    <p id = "p-pergunta--usuario">Escolha seu número entre 1 e 59 </p>

                    <div class = "div-limpar">
                        <button id = "limpar" onclick = "limpar()" ><img src="lixo.png"></button>
                    </div>

                    <input type="text" placeholder = "Digite seu número aqui" id = "input-pergunta-usuario">

                    
                    <button id = "verificar" onclick="catchUserValue()"><img class = "enviar" src = "enviar.png"></button>
                </div>
                    
                    <section id = "sec-secundaria">
                        <div class = "valor-comp">
                            <h3 class = "h3-valor-comp">
                                O número gerado é:
                            </h3>
                        
                            <p id = "p-valor-comp">
                                
                            </p>
                        </div>
                        <div class = "div-resultado-final">
                            <p>
                                Seu resultado é: 
                            </p>

                            <p id = "result-final">
                                
                            </p>
                        </div>
                    </section>
            </div>
        </section>

    </main>

    <footer>
        <ul class = "lista-links">
            <li class = "lista-links link-github">
                <a href = "https://github.com/PedroDVasconcelos" >GitHub</a>
            </li>
            <li class = "lista-links link-linkedin">
                <a href = "https://www.linkedin.com/in/pedro-vasconcelos-59059238b/">Linkedin</a>
            </li>
            <li>
                <p>
                    feito por <i>Pedro Vasconcelos</i>
                </p>
            </li>
        </ul>
    </footer>

    
    </footer>
    <script src="script.js"></script>
</body>
</html>
