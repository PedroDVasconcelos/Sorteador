    <header>
            <div>

        <div id = "principal-container">
            <div class = "div-pergunta-usuario">

                <input type="text" placeholder = "Digite seu número aqui" id = "input-pergunta-usuario">

                <button id = "verificar" onclick="catchUserValue()"><img class = "enviar" src = "enviar.png"></button>
            </div>
                
                <div class = "valor-comp">
                    <p>
                         O número gerado é:
                    </p>
                
                    <p id = "valor-comp">
                          
                    </p>
                </div>

            <p>
                Seu resultado é: 
            </p>

            <p id = "result-final">
                 
            </p>

            <button onclick = "limpar()" >Limpar tudo</button>
    </div>

    </main>
